# SQLite 数据源配置（开发默认）
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/ecommerce.db
    username:
    password:
    druid:
      initial-size: 1
      max-active: 5
      test-while-idle: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
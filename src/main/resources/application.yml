# 主配置：默认 SQLite 开发环境
server:
  port: 8080

spring:
  profiles:
    active: sqlite
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ecommerce.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT 密钥（生产环境请改为环境变量）
jwt:
  secret: ecommerce-shopping-platform-secret-key-change-in-prod
  expire-hours: 72

# AI 描述（假实现开关，后续可接 OpenAI）
ai:
  description:
    enabled: true

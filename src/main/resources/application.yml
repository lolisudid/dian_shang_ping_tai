# 主配置：默认 SQLite 开发环境
server:
  port: 8080

spring:
  profiles:
    active: sqlite
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ecommerce.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 密钥
jwt:
  secret: ecommerce-shopping-platform-secret-key-change-in-prod
  expire-hours: 72

# AI 描述（假实现开关）
ai:
  description:
    enabled: true
